version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: talentmind-postgres
    environment:
      POSTGRES_DB: talentmind
      POSTGRES_USER: talentmind
      POSTGRES_PASSWORD: talentmind123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    networks:
      - talentmind-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentmind -d talentmind"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    container_name: talentmind-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - talentmind-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: talentmind-backend
    environment:
      DATABASE_URL: postgresql://talentmind:talentmind123@postgres:5432/talentmind
      SECRET_KEY: talentmind-super-secret-key-change-in-production-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      DEMO_MODE: "false"
      CORS_ORIGINS: '["http://localhost:3000", "http://frontend:3000"]'
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - talentmind-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: talentmind-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: TalentMind AI
    ports:
      - "3000:3000"
    networks:
      - talentmind-network
    depends_on:
      - backend

volumes:
  postgres_data:
  ollama_data:
  uploads_data:

networks:
  talentmind-network:
    driver: bridge
